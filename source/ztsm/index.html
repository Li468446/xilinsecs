<style>
.team-pin-card {
  position: relative;
  display: flex;
  justify-content: center;
  margin: 60px 0;
  padding: 0 20px;
}

.glass-card {
  position: relative;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 30px 40px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.glass-card:hover {
  transform: translateY(-4px);
  box-shadow:
    0 16px 48px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.15);
}

.card-glow {
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(
    circle at center,
    rgba(10, 132, 255, 0.15) 0%,
    rgba(48, 209, 88, 0.08) 30%,
    rgba(255, 159, 10, 0.05) 60%,
    transparent 70%
  );
  animation: glowPulse 8s infinite ease-in-out;
  pointer-events: none;
  z-index: -1;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.5; transform: scale(1) rotate(0deg); }
  50% { opacity: 0.8; transform: scale(1.1) rotate(180deg); }
}

.pin-card h3 {
  font-size: 24px;
  margin-bottom: 16px;
  color: #ffffff;
  font-weight: 600;
  letter-spacing: 1px;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.toggle-btn {
  background: linear-gradient(135deg, #007aff 0%, #0051d4 100%);
  color: #fff;
  border: none;
  padding: 12px 24px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: all 0.25s ease;
  box-shadow: 0 4px 16px rgba(0, 122, 255, 0.4);
}

.toggle-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 24px rgba(0, 122, 255, 0.5);
}

.toggle-btn:active {
  transform: scale(0.98);
}

.toggle-btn:focus {
  outline: none;
  box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.4);
}

.pin-content {
  display: none;
  margin-top: 20px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.pin-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin: 16px 0;
}

.pin-value {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #0a84ff 0%, #30d158 50%, #ff9f0a 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 4px;
  margin: 0;
  filter: drop-shadow(0 2px 8px rgba(10, 132, 255, 0.4));
}

.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
}

.copy-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
}

.copy-btn:active {
  transform: scale(0.95);
}

.copy-btn:focus {
  outline: none;
  box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.4);
}

.copy-btn.copied {
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  animation: copySuccess 0.4s ease;
}

@keyframes copySuccess {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

.copy-icon {
  width: 16px;
  height: 16px;
}

.copy-text {
  display: inline;
}

.pin-note {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  margin-bottom: 16px;
}

.pin-warning {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #fca5a5;
  background: rgba(239, 68, 68, 0.15);
  padding: 10px 16px;
  border-radius: 10px;
  border: 1px solid rgba(239, 68, 68, 0.3);
}

.warning-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

@media (max-width: 480px) {
  .glass-card {
    padding: 24px 20px;
    margin: 0 10px;
  }

  .pin-value {
    font-size: 28px;
    letter-spacing: 2px;
  }

  .pin-box {
    flex-direction: column;
    gap: 12px;
  }

  .copy-btn {
    width: 100%;
    justify-content: center;
  }
}
</style>

<script>
function togglePin() {
  const content = document.getElementById("pinContent");
  const btn = document.querySelector(".toggle-btn");
  if (content.style.display === "block") {
    content.style.display = "none";
    btn.textContent = "查看 PIN 码";
  } else {
    content.style.display = "block";
    btn.textContent = "隐藏 PIN 码";
  }
}

function copyPin() {
  const pinText = document.getElementById("pinValue").innerText;
  navigator.clipboard.writeText(pinText).then(() => {
    const btn = document.querySelector(".copy-btn");
    const copyText = btn.querySelector(".copy-text");
    btn.classList.add("copied");
    copyText.textContent = "已复制";
    setTimeout(() => {
      btn.classList.remove("copied");
      copyText.textContent = "复制";
    }, 1500);
  });
}
</script>
