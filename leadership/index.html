  <style>
    :root {
      --apple-bg: #f5f7fa;
      --apple-card-bg: rgba(255, 255, 255, 0.85);
      --apple-text: #333;
      --apple-text-light: #6c757d;
      --apple-accent: #0071e3;
      --apple-accent-hover: #0077ed;
      --apple-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      --glass-border: 1px solid rgba(255, 255, 255, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
      color: var(--apple-text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      padding-top: 70px;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(255, 255, 255, 0.4);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
      transition: background 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      font-size: 1.125rem;
    }

    .navbar.scrolled {
      background: rgba(30, 30, 30, 0.8);
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
    }

    .navbar-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.4rem;
      color: #1d1d1f;
      letter-spacing: -0.5px;
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: color 0.4s;
    }

    .navbar.scrolled .navbar-brand { color: #ffffff; }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 0.5rem;
    }

    .nav-link {
      font-weight: 500;
      color: #444;
      padding: 0.625rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    .nav-link:hover { color: #007bff; background: rgba(0, 113, 227, 0.08); }
    .nav-link.active { color: var(--apple-accent); font-weight: 600; }
    .navbar.scrolled .nav-link { color: #ffffff; }
    .navbar.scrolled .nav-link:hover { color: #007bff; background: rgba(0, 113, 227, 0.2); }
    .navbar.scrolled .nav-link.active { color: #007bff; }

    .nav-toggle {
      display: none;
      background: none;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 5px;
      padding: 0.5rem;
      cursor: pointer;
    }

    .nav-toggle-icon {
      display: block;
      width: 24px;
      height: 2px;
      background: #444;
      position: relative;
      transition: background 0.3s;
    }

    .nav-toggle-icon::before,
    .nav-toggle-icon::after {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: #444;
      transition: transform 0.3s;
    }

    .nav-toggle-icon::before { top: -7px; }
    .nav-toggle-icon::after { bottom: -7px; }

    .navbar.scrolled .nav-toggle-icon { background: #fff; }
    .navbar.scrolled .nav-toggle-icon::before,
    .navbar.scrolled .nav-toggle-icon::after { background: #fff; }

    @media (max-width: 768px) {
      .nav-toggle { display: block; }
      .nav-menu {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.95);
        flex-direction: column;
        padding: 1rem;
        display: none;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      }
      .nav-menu.open { display: flex; }
      .navbar.scrolled .nav-menu { background: rgba(30, 30, 30, 0.95); }
    }

    .hero {
      padding: 80px 0 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 113, 227, 0.1) 0%, rgba(0, 113, 227, 0.05) 100%);
      z-index: -1;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.2;
      color: #1d1d1f;
      letter-spacing: -1px;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 1.2rem;
      color: #444;
      max-width: 700px;
      margin: 0 auto;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    .category-nav {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 30px 0 40px;
      flex-wrap: wrap;
    }

    .category-btn {
      border: none;
      background: var(--apple-card-bg);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 12px;
      box-shadow: var(--apple-shadow);
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      color: var(--apple-text);
    }

    .category-btn.active {
      background: var(--apple-accent);
      color: white;
    }

    .category-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
    }

    .content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      padding: 0 0 80px;
    }

    .card {
      background: var(--apple-card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--apple-shadow);
      border: var(--glass-border);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-content h3 {
      font-size: 1.25rem;
      margin: 0 0 10px;
      font-weight: 600;
      color: #1d1d1f;
    }

    .card-content p {
      font-size: 0.95rem;
      color: #515154;
      line-height: 1.6;
      flex: 1;
    }

    .card-content .date {
      font-size: 0.85rem;
      color: #86868b;
      margin-top: 12px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-content {
      background: var(--apple-card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      max-width: 600px;
      width: 90%;
      padding: 25px;
      box-shadow: var(--apple-shadow);
      border: var(--glass-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .modal-content img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    .modal-content h2 {
      font-size: 1.5rem;
      color: var(--apple-accent);
      margin-bottom: 10px;
      text-align: center;
    }

    .modal-content p {
      font-size: 1rem;
      color: #444;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .modal-content .date {
      font-size: 0.9rem;
      color: #86868b;
      margin-bottom: 15px;
    }

    .link-btn {
      padding: 12px 24px;
      background: var(--apple-accent);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .link-btn:hover {
      background: var(--apple-accent-hover);
      transform: translateY(-2px);
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      color: #666;
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.3s;
    }

    .close-btn:hover { color: #1d1d1f; }

    .footer {
      padding: 40px 0;
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      .hero p { font-size: 1rem; }
      .category-nav { gap: 10px; margin: 20px 0 30px; }
      .category-btn { padding: 10px 18px; font-size: 0.9rem; }
    }

    @media (max-width: 480px) {
      .content { grid-template-columns: 1fr; }
    }
  </style>

    </div>

  <div class="container">
    <nav class="category-nav">
      <button class="category-btn active" data-category="life">企业生活动态</button>
      <button class="category-btn" data-category="finance">财报公开</button>

  <script src="config.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var navbar = document.getElementById('navbar');
      var navToggle = document.getElementById('navToggle');
      var navMenu = document.getElementById('navMenu');

      navToggle.addEventListener('click', function() {
        navMenu.classList.toggle('open');
      });

      var scrollHandler = function() {
        var scrollPosition = window.scrollY;
        if (scrollPosition > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      };
      window.addEventListener('scroll', scrollHandler, { passive: true });
      scrollHandler();

      var contentArea = document.getElementById('content-area');
      var buttons = document.querySelectorAll('.category-btn');
      var modal = document.getElementById('modal');
      var modalImg = document.getElementById('modal-img');
      var modalTitle = document.getElementById('modal-title');
      var modalDesc = document.getElementById('modal-desc');
      var modalDate = document.getElementById('modal-date');
      var modalLink = document.getElementById('modal-link');
      var closeModalBtn = document.getElementById('closeModal');

      function render(category) {
        contentArea.innerHTML = '';
        if (!data || !data[category]) return;
        data[category].forEach(function(item) {
          var card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = '<img src="' + item.img + '" alt="' + item.title + '">' +
            '<div class="card-content">' +
            '<h3>' + item.title + '</h3>' +
            '<p>' + item.desc + '</p>' +
            '<div class="date">' + item.date + '</div>' +
            '</div>';
          card.addEventListener('click', function() { openModal(item); });
          contentArea.appendChild(card);
        });
      }

      function openModal(item) {
        modal.style.display = 'flex';
        modalImg.src = item.img;
        modalImg.alt = item.title;
        modalTitle.textContent = item.title;
        modalDesc.textContent = item.desc;
        modalDate.textContent = item.date;
        modalLink.href = item.url;
      }

      closeModalBtn.addEventListener('click', function() { modal.style.display = 'none'; });
      modal.addEventListener('click', function(e) { if (e.target === modal) modal.style.display = 'none'; });

      buttons.forEach(function(btn) {
        btn.addEventListener('click', function() {
          buttons.forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          render(btn.dataset.category);
        });
      });

      render('life');
    });
  </script>
